[tool.ruff]
# Keep Python style consistent across the project.
line-length = 88
target-version = "py312"
extend-exclude = [
    "env",
    "*/migrations/*",
    "staticfiles",
    "theme/static_src/node_modules",
]

[tool.ruff.lint]
# pycodestyle (E), pyflakes (F), isort (I), pyupgrade (UP), flake8-bugbear (B).
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line length handled by the formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
