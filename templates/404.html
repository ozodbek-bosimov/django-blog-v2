{% extends 'base.html' %}
{% load static %}

{% block title %}404{% endblock title %}

{% block content %}

<div class='text-white p-3 md:px-10 lg:px-20 xl:px-40 2xl:px-72'>
  <div class='p-5 grid place-items-center mt-10 mb-40 text-center'>
    <p class='my-4 text-5xl font-extrabold md:text-8xl'>404</p>
    <p>We couldn't find the requested page. It must have been sucked into a wormhole.</p>
  </div>
  <div class="text-xl p-5 grid grid-cols-1 place-items-center items-center md:grid-cols-3 -mt-44 gap-x-4">
    <a href="{% url 'home' %}" style="box-shadow:0 5px 30px 0 rgba(0,0,0,.05);"
      class="text-white no-underline hover:scale-105 hover:transform transition duration-300 bg-gray-900 rounded-lg h-40 w-full my-4 text-center p-5 grid place-items-center">
      <div>
        <p class='text-4xl my-2'><i
            class="bi bi-house-door text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500"></i>
        </p>
        <p class='text-base'>Return Home</p>
      </div>
    </a>
    <a href="{% url 'categories' %}" style="box-shadow:0 5px 30px 0 rgba(0,0,0,.05);"
      class="text-white no-underline hover:scale-105 hover:transform transition duration-300 bg-gray-900 rounded-lg h-40 w-full my-4 text-center p-5 grid place-items-center">
      <div>
        <p class='text-4xl my-2'><i
            class="bi bi-tags text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500"></i>
        </p>
        <p class='text-base'>Browse Categories</p>
      </div>
    </a>
    <a href="{% url 'blog' %}" style="box-shadow:0 5px 30px 0 rgba(0,0,0,.05);"
      class="text-white no-underline hover:scale-105 hover:transform transition duration-300 bg-gray-900 rounded-lg h-40 w-full my-4 text-center p-5 grid place-items-center">
      <div>
        <p class='text-4xl my-2'><i
            class="bi bi-book text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500"></i>
        </p>
        <p class='text-base'>Visit Blog</p>
      </div>
    </a>
  </div>
</div>

{% endblock %}
