{% extends 'base.html' %}
{% load static %}

{% block title %}404 - Not Found{% endblock title %}

{% block content %}

<div class='min-h-[60vh] flex flex-col items-center justify-center p-6 text-center'>
    <div class="flex flex-col items-center">
        <!-- Minimalist 404 Text -->
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter text-gray-200 leading-none mb-4">
            404
        </h1>
        
        <h2 class="text-xl md:text-2xl font-semibold text-white tracking-tight mb-3">
            Page not found
        </h2>
        
        <p class="text-gray-400 text-base md:text-lg max-w-md mb-8 font-light">
            The page you are looking for doesn't exist or has been moved.
        </p>

        <!-- Elegant Action Buttons -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full mt-6 mx-auto">
            <a href="{% url 'home' %}" class="w-full max-w-[300px] sm:max-w-none sm:w-56 inline-flex justify-center items-center whitespace-nowrap gap-2 px-6 py-3 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-medium hover:scale-105 transition-all duration-300">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
            <a href="{% url 'categories' %}" class="w-full max-w-[300px] sm:max-w-none sm:w-56 inline-flex justify-center items-center whitespace-nowrap gap-2 px-6 py-3 rounded-full bg-white/5 text-white ring-1 ring-inset ring-white/10 hover:bg-white/10 hover:scale-105 transition-all duration-300 font-medium">
                <i class="bi bi-tags"></i> Browse Categories
            </a>
        </div>
    </div>
</div>

{% endblock %}
