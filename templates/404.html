{% extends 'base.html' %}
{% load static %}

{% block title %}404 - Not Found{% endblock title %}

{% block content %}

<div class='min-h-[60vh] flex flex-col items-center justify-center p-6 text-center'>
    <div class="flex flex-col items-center">
        <!-- Minimalist 404 Text -->
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter text-gray-200 leading-none mb-4">
            404
        </h1>
        
        <h2 class="text-xl md:text-2xl font-semibold text-white tracking-tight mb-3">
            Page not found
        </h2>
        
        <p class="text-gray-400 text-base md:text-lg max-w-md mb-8 font-light">
            The page you are looking for doesn't exist or has been moved.
        </p>

        <!-- Elegant Action Buttons -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full mt-6 mx-auto">
              <a href="{% url 'home' %}" class="btn-primary btn-cyan btn-lg btn-action">
                  <i class="bi bi-arrow-left"></i> Back to home
              </a>
              <a href="{% url 'topics' %}" class="btn-ghost btn-lg btn-action">
                  <i class="bi bi-tags"></i> Browse topics
              </a>
        </div>
    </div>
</div>

{% endblock %}
