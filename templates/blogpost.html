{% extends 'base.html' %}

{% block title %}{{blog.title}}{% endblock title %}

{% block content %}
<div class='bg-gray-800 text-white p-8 pt-12 flex flex-col md:px-20 lg:px-36 xl:px-60 2xl:px-80'>
    <span class='text-center text-3xl md:text-4xl font-bold text-cyan-200 hover:text-cyan-300 transition duration-300'>
        <a href='/blogpost/{{blog.slug}}'>{{blog.title}}</a>
    </span>
    <span class='text-center mt-2 text-gray-400'>by <a href='/about'><i class="bi bi-person"></i> <span class='group'><span class='group-hover:text-cyan-200 bg-left-bottom bg-gradient-to-r from-cyan-300 to-blue-500 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out'>Ozodbek</span></span></a> <i class="bi bi-dot"></i> <span><i class="bi bi-calendar4-event"></i> {{blog.time}}</span> <i class="bi bi-dot"></i> <i class="bi bi-tag"></i> <a href='/category/{{blog.category}}'><span class='group'><span class='group-hover:text-cyan-200 bg-left-bottom bg-gradient-to-r from-cyan-300 to-blue-500 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out'>{{blog.category}}</span></span></a></span>
    {% if blog.effective_thumbnail %}
    <img class='rounded-lg my-6 max-w-4xl mx-auto w-full object-contain' style="max-height: 600px;" src="{{ blog.effective_thumbnail }}" alt="image">
    {% endif %}
    <div class='blog-content ck-content'>{{blog.content|safe}}</div>
</div>
<style> 
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        font-size: revert;
        font-weight: revert;
    }

    .blog-content .text-tiny {
        font-size: 0.7em;
    }

    .blog-content .text-small {
        font-size: 0.85em;
    }

    .blog-content .text-big {
        font-size: 1.4em;
    }

    .blog-content .text-huge {
        font-size: 1.8em;
    }
  
    .blog-content a {
        color: #67e8f9;
        text-decoration: none !important;
        background-image: linear-gradient(currentColor, currentColor);
        background-repeat: no-repeat;
        background-size: 0 2px;
        background-position: 0 100%;
        transition: color 220ms ease, background-size 220ms ease;
    }

    .blog-content a:hover,
    .blog-content a:focus {
        color: #a5f3fc;
        background-size: 100% 2px;
    }
    p img {
        border-radius: 8px;
    }

    /* YouTube iframe uchun */
    p iframe {
        max-width: 100%;
        height: auto;
        aspect-ratio: 16/9;
        border-radius: 8px;
        margin: 1rem 0;
    }

    /* Video wrapper uchun */
    .video-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        margin: 1rem 0;
    }

    .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 8px;
    }

    /* Code blocks - Prism.js bilan */
    pre[class*="language-"] {
        margin: 1rem 0 !important;
        border-radius: 12px !important;
        background: #0d1b2a !important;
        border: 1px solid rgba(103, 232, 249, 0.15) !important;
        box-shadow: 0 8px 24px rgba(2, 6, 23, 0.35);
        position: relative;
        padding-top: 2rem !important;
        overflow: auto;
    }

    pre[class*="language-"]::before {
        content: attr(data-language);
        position: absolute;
        top: 0.55rem;
        right: 0.75rem;
        font-size: 0.68rem;
        line-height: 1;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #cbd5e1;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.35);
        padding: 0.2rem 0.45rem;
        border-radius: 9999px;
    }

    pre[class*="language-"] code {
        font-size: 0.92rem;
        background: transparent !important;
    }

    /* Inline code uchun */
    :not(pre) > code {
        background-color: rgba(14, 116, 144, 0.35);
        color: #a5f3fc;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
        font-family: 'Courier New', Courier, monospace;
        border: 1px solid rgba(34, 211, 238, 0.25);
    }

</style>

<script>
// CKEditor dan kelgan code bloklarni Prism.js bilan ranglash
document.addEventListener('DOMContentLoaded', function() {
    const toPrettyLanguage = (lang) => {
        if (!lang) {
            return 'Python';
        }
        const normalized = lang.toLowerCase();
        if (normalized === 'cpp') return 'C++';
        if (normalized === 'cs') return 'C#';
        return normalized.charAt(0).toUpperCase() + normalized.slice(1);
    };

    // Barcha <pre> taglarni topish
    const preElements = document.querySelectorAll('pre');
    
    preElements.forEach(pre => {
        const code = pre.querySelector('code');
        if (!code) {
            return;
        }

        const languageClass = [...code.classList, ...pre.classList]
            .find(cls => cls.startsWith('language-'));
        const language = languageClass ? languageClass.replace('language-', '') : 'python';
        
        if (!languageClass) {
            // Agar class yo'q bo'lsa, default Python qilamiz
            pre.classList.add('language-python');
            code.classList.add('language-python');
        }

        pre.setAttribute('data-language', toPrettyLanguage(language));
    });
    
    // Prism.js ni qayta run qilish
    if (typeof Prism !== 'undefined') {
        Prism.highlightAll();
    }
});
</script>
{% endblock %}
