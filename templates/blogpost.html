{% extends 'base.html' %}

{% block title %}{{blog.title}}{% endblock title %}

{% block content %}
<div class='bg-gray-800 text-white p-8 pt-12 flex flex-col md:px-20 lg:px-36 xl:px-60 2xl:px-80'>
    <span class='text-center text-3xl md:text-4xl font-bold text-cyan-200 hover:text-cyan-300 transition duration-300'>
        <a href='/blogpost/{{blog.slug}}'>{{blog.title}}</a>
    </span>
    <span class='text-center mt-2 text-gray-400'>by <a href='/about'><i class="bi bi-person"></i> <span class='group'><span class='group-hover:text-cyan-200 bg-left-bottom bg-gradient-to-r from-cyan-300 to-blue-500 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out'>Ozodbek</span></span></a> <i class="bi bi-dot"></i> <span><i class="bi bi-calendar4-event"></i> {{blog.time}}</span> <i class="bi bi-dot"></i> <i class="bi bi-tag"></i> <a href='/category/{{blog.category}}'><span class='group'><span class='group-hover:text-cyan-200 bg-left-bottom bg-gradient-to-r from-cyan-300 to-blue-500 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out'>{{blog.category}}</span></span></a></span>
    {% if blog.effective_thumbnail %}
    <img class='rounded-lg my-6 flex justify-center' src="{{ blog.effective_thumbnail }}">
    {% endif %}
    <p class=''>{{blog.content|safe}} </p>
</div>
<style> 
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        font-size: revert;
        font-weight: revert;
    }
  
    p a {
        color: #67e8f9;
        background: 
          linear-gradient(to right, rgba(103,232,249, 1), rgba(59, 130, 246, 1)),
          linear-gradient(to right, rgba(34,211,238, 1), rgba(59, 130, 246, 1), rgba(29, 78, 216, 1));
        background-size: 100% 0.1em, 0 0.1em;
        background-position: 100% 100%, 0 100%;
        background-repeat: no-repeat;
        transition: background-size 400ms;
    }
      
    p a:hover,
    p a:focus {
        background-size: 0 0.1em, 100% 0.1em;
    }
    p img {
        border-radius: 8px;
    }

    /* Code blocks - Prism.js bilan */
    pre[class*="language-"] {
        margin: 1rem 0 !important;
        border-radius: 10px !important;
        background: linear-gradient(135deg, #0f172a, #0b2236) !important;
        border: 1px solid rgba(103, 232, 249, 0.15) !important;
        box-shadow: 0 8px 24px rgba(2, 6, 23, 0.35);
    }

    /* Inline code uchun */
    :not(pre) > code {
        background-color: rgba(14, 116, 144, 0.35);
        color: #a5f3fc;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
        font-family: 'Courier New', Courier, monospace;
        border: 1px solid rgba(34, 211, 238, 0.25);
    }

</style>

<script>
// TinyMCE dan kelgan code bloklarni Prism.js bilan ranglash
document.addEventListener('DOMContentLoaded', function() {
    // Barcha <pre> taglarni topish
    const preElements = document.querySelectorAll('pre');
    
    preElements.forEach(pre => {
        const code = pre.querySelector('code');
        
        if (code && !code.classList.contains('language-')) {
            // Agar class yo'q bo'lsa, default Python qilamiz
            pre.classList.add('language-python');
            code.classList.add('language-python');
        }
    });
    
    // Prism.js ni qayta run qilish
    if (typeof Prism !== 'undefined') {
        Prism.highlightAll();
    }
});
</script>
{% endblock %}
