{% extends 'base.html' %}
{% load static %}

{% block title %}Categories{% endblock title %}

{% block meta %}
<meta name="description" content="Browse posts by category on Ozodbek Bosimov's blog. From programming and tech notes to personal reflections and study logs.">
<link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{% url 'categories' %}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Ozodbek Bosimov">
<meta property="og:locale" content="en_US">
<meta property="og:title" content="Categories — Ozodbek Bosimov">
<meta property="og:description" content="Browse posts by category on Ozodbek Bosimov's blog. From programming and tech notes to personal reflections and study logs.">
<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{% url 'categories' %}">
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/banner.jpg' %}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Categories — Ozodbek Bosimov">
<meta name="twitter:description" content="Browse posts by category on Ozodbek Bosimov's blog. From programming and tech notes to personal reflections and study logs.">
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/banner.jpg' %}">
{% endblock meta %}

{% block content %}

<div class='bg-gray-800 text-white p-3 md:px-10 lg:px-20 xl:px-40 2xl:px-72'>
  <p class='text-4xl font-extrabold py-5 text-center md:text-start'>Categories</p>
  <div class="text-xl p-5 grid grid-cols-1 place-items-center items-center md:grid-cols-3 gap-x-8">
    {% for category in all_categories %}
    <a href="{% url 'category' category.category %}" style="box-shadow:0 5px 30px 0 rgba(0,0,0,.05);"
      class="text-white no-underline hover:scale-105 hover:transform transition duration-300 bg-gray-900 rounded-lg h-40 w-full my-4 text-center p-5 grid place-items-center">
      <div>
        <p class='text-4xl my-2'><i
            class="bi bi-tags text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500"></i></p>
        <p class='text-base'>{{ category.category }}</p>
      </div>
    </a>
    {% endfor %}
  </div>
</div>

{% endblock %}
