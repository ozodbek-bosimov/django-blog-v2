{% load blog_extras %}

<div class='flex flex-col md:flex-row gap-4 md:gap-x-8 bg-white/5 backdrop-blur-lg rounded-2xl ring-1 ring-inset ring-white/10 shadow-2xl hover:bg-white/10 hover:ring-white/20 p-5 mb-6 transition-all duration-300 hover:-translate-y-1'>
  {% if blog.effective_thumbnail %}
  <div class="w-full md:w-[350px] md:flex-shrink-0 overflow-hidden rounded-lg" style="height: 200px;">
    <img class="w-full h-full object-cover"
      src="{{ blog.effective_thumbnail }}" alt="{{ blog.title }}">
  </div>
  {% endif %}
  <div class="min-w-0">
    <a class='text-blue-100 hover:text-blue-300 transition duration-300'
      href='{% url "blogpost" blog.slug %}'><span
        class='text-xl font-bold'>{{ blog.title|slice:80 }}</span></a><br>
    <p class='my-3 break-words'>{{ blog.meta|slice:600 }}</p>
    <p class='mt-2 mb-4 text-gray-400'>by <i class="bi bi-person"></i> <a href='{% url "about" %}'
        class='group transition-all duration-500 ease-out'><span
          class='bg-left-bottom bg-gradient-to-r from-cyan-300 to-blue-500 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out group-hover:text-cyan-200'>Ozodbek</span></a>
      <i class="bi bi-dot"></i><i class="bi bi-tag"></i> <a href='{% url "category" blog.category %}'
        class='group transition-all duration-500 ease-out'><span
          class='bg-left-bottom bg-gradient-to-r from-cyan-300 to-blue-500 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out group-hover:text-cyan-200'>{{ blog.category }}</span></a>
      <i class="bi bi-dot"></i> <span><i class="bi bi-calendar4-event"></i> {{ blog.time|date:"M j, Y" }}</span>
      <i class="bi bi-dot"></i> <span><i class="bi bi-clock"></i> {{ blog.content|reading_time }} min read</span>
    </p>
    <a href='{% url "blogpost" blog.slug %}'
      class='inline-flex items-center gap-2 bg-blue-600 text-white font-semibold px-4 py-2 rounded-xl ring-1 ring-inset ring-white/20 hover:bg-blue-500 hover:shadow-lg hover:shadow-blue-500/30 hover:-translate-y-0.5 transition-all duration-300 my-3'>Read
      more <i class="bi bi-arrow-right"></i></a>
  </div>
</div>
