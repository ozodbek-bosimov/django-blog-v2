{% load blog_extras %}

<div
    class="blog-list-card glass-card solid-content-card flex flex-col gap-5 p-5 md:p-6 mb-6 overflow-hidden reveal"
>
    {% if blog.effective_thumbnail %}
    <div class="blog-list-thumb">
        <img
            class="w-full h-full object-cover"
            src="{{ blog.effective_thumbnail }}"
            alt="{{ blog.title }}"
        />
    </div>
    {% endif %}
    <div class="flex-1 min-w-0">
        <h3 class="font-bold text-lg text-gray-100 mb-2 md:mb-3 line-clamp-2">{{ blog.title|truncatechars:80 }}</h3>
        <p
            class="text-sm md:text-base leading-relaxed mb-4 break-words text-gray-100 line-clamp-3"
        >
            {{ blog.meta|truncatechars:200 }}
        </p>
        <div class="post-meta text-gray-400 mb-4">
            <span
                ><i class="bi bi-tag"></i>
                <a
                    href='{% url "category" blog.category %}'
                    class="hover:text-cyan-400 transition-colors duration-300"
                    >{{ blog.category }}</a
                ></span
            >
            <i class="bi bi-dot"></i>
            <span>
                <i class="bi bi-calendar4-event"></i> {{ blog.time|date:"M j, Y" }}
            </span>
            <i class="bi bi-dot"></i>
            <span
                ><i class="bi bi-clock"></i> {{ blog.reading_time_minutes }} min
                read</span
            >
        </div>
        <a
            href='{% url "blogpost" blog.slug %}'
            class="btn-primary btn-md whitespace-nowrap"
            >Read more <i class="bi bi-arrow-right"></i
        ></a>
    </div>
</div>
