{% extends 'base.html' %}
{% load static %}

{% block title %}Topics{% endblock title %}

{% block meta %}
<meta name="description" content="Browse posts by topic on Ozodbek Bosimov's blog. From programming and tech notes to personal reflections and study logs.">
<link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{% url 'topics' %}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Ozodbek Bosimov">
<meta property="og:locale" content="en_US">
<meta property="og:title" content="Topics — Ozodbek Bosimov">
<meta property="og:description" content="Browse posts by topic on Ozodbek Bosimov's blog. From programming and tech notes to personal reflections and study logs.">
<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{% url 'topics' %}">
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/banner.jpg' %}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Topics — Ozodbek Bosimov">
<meta name="twitter:description" content="Browse posts by topic on Ozodbek Bosimov's blog. From programming and tech notes to personal reflections and study logs.">
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/banner.jpg' %}">
{% endblock meta %}

{% block content %}

<div class="px-4 sm:px-6 md:px-20 w-full mt-6 md:mt-8 mb-0 reveal">
    <h1 class="text-2xl md:text-3xl font-semibold text-gray-100 tracking-wide mb-4 text-center">
        Topics
    </h1>
    <div class="h-px bg-gray-700/50 w-full"></div>
</div>

<div class='text-white p-5 md:py-8 md:px-20 lg:px-40 xl:px-60'>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 reveal-stagger">
    {% for topic in all_topics %}
    <a href="{% url 'topic' topic.topic %}" 
      class="group relative glass-card px-6 py-5 hover:ring-cyan-500/40 hover:bg-white/5 transition-all duration-300 flex items-center justify-center text-center reveal-scale">
        <div>
          <h3 class="text-sm md:text-base font-medium text-gray-200 group-hover:text-cyan-300 transition-colors">{{ topic.topic }}</h3>
          <div class="topic-count mt-1">{{ topic.count }} post{{ topic.count|pluralize }}</div>
        </div>
    </a>
    {% endfor %}
  </div>
</div>

{% endblock %}
