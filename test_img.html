<!DOCTYPE html>
<html>
<body>
  <div id="target"></div>
  <script>
    const target = document.getElementById('target');
    target.innerHTML = '<img id="my-img" alt="Test" />';
    
    setTimeout(() => {
      const img = document.getElementById('my-img');
      img.onload = () => console.log('Image loaded!');
      img.onerror = () => console.log('Image error!');
      img.src = 'https://github-readme-stats-salesp07.vercel.app/api?username=ozodbek-bosimov';
      if (img.complete) console.log('Image complete!');
    }, 100);
  </script>
</body>
</html>
